
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        .player-box {
            position: relative;
            width: 95%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7);
            border: 1px solid #1a1a1a;
        }

        /* Area Utama (Viewport) */
        .viewport {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 5;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            transition: opacity 0.3s ease;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Control Bar Minimalis */
        .controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            z-index: 10;
        }

        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 16px;
            border-radius: 2px;
        }

        .progress-bar {
            width: 0%; /* Tetap kosong */
            height: 100%;
            background: #fff;
            border-radius: 2px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            color: rgba(255,255,255,0.9);
        }

        .btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .status-text {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="player-box">
        <!-- Area Klik & Spinner -->
        <div class="viewport" id="viewport">
            <div class="spinner" id="spinner"></div>
            <div class="status-text" id="status">Buffering</div>
        </div>

        <!-- Control Bar -->
        <div class="controls">
            <!-- Progress Bar Tetap 0 -->
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
            
            <div class="control-row">
                <div class="flex items-center gap-6">
                    <button class="btn" id="playBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <div class="flex items-center">
                        <span id="currentTime">00:00</span>
                        <span class="mx-1 opacity-30">/</span>
                        <span class="opacity-50">10:00</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <button class="btn opacity-60">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button class="btn opacity-60">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const viewport = document.getElementById('viewport');
        const playBtn = document.getElementById('playBtn');
        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('status');
        let isPlaying = true;

        // Fungsi toggle hanya untuk visual spinner & status teks
        function togglePlayer() {
            isPlaying = !isPlaying;
            if (isPlaying) {
                spinner.style.animationPlayState = 'running';
                spinner.style.opacity = '1';
                statusText.textContent = 'Buffering';
                playBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
            } else {
                spinner.style.animationPlayState = 'paused';
                spinner.style.opacity = '0.3';
                statusText.textContent = 'Paused';
                playBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            }
        }

        viewport.addEventListener('click', togglePlayer);
        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlayer();
        });
    </script>
